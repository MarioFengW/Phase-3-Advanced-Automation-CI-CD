name: CI - Correr Tests

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'

env:
  NODE_VERSION: '20'
  ENTORNO: 'produccion'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Correr tests y generar cobertura
        run: |
          mkdir -p test-results
          npm run test:ci > test-results/test-output.txt

      - name: Subir reporte de tests como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-tests
          path: |
            coverage/
            test-results/
          retention-days: 7

  validar-artifact:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Descargar artifact de tests
        uses: actions/download-artifact@v4
        with:
          name: reporte-tests
          path: artifacts/reporte-tests

      - name: Mostrar contenido del artifact
        run: ls -R artifacts/reporte-tests

  deploy-simulado:
    runs-on: ubuntu-latest
    needs: [test, validar-artifact]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Simular deploy
        run: |
          echo "Deploying to ${ENTORNO}..."
          echo "Commit: ${{ github.sha }}"
          echo "Deploy exitoso!"

  docker-publish:
    runs-on: ubuntu-latest
    needs: [test, validar-artifact]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir tag en minusculas
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}